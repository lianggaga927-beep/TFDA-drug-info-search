name: Build Drug Database

# 觸發條件
on:
  workflow_dispatch:           # 手動觸發（你可以隨時在 Actions 頁面點「Run workflow」）
  schedule:
    - cron: '0 18 1 * *'       # 每月 1 號 UTC 18:00 = 台灣 02:00 自動執行
  push:
    paths:
      - 'build_data.py'        # 修改腳本本身時也跑一次

permissions:
  contents: write              # 允許 commit & push

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build drug database
        run: python build_data.py

      - name: Show output file info
        run: |
          ls -lh drugs_data.json
          echo "---"
          python -c "import json; d=json.load(open('drugs_data.json',encoding='utf-8')); print('總筆數:', d['_meta']['totalRecords'])"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drugs_data.json
          if git diff --staged --quiet; then
            echo "📋 資料無變動，跳過 commit"
          else
            git commit -m "data: 自動更新藥品資料庫 $(date +'%Y-%m-%d')"
            git push
            echo "✅ 已自動更新 drugs_data.json"
          fi
