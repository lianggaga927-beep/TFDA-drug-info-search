name: Build Drug Database

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 1 * *'       # 每月 1 號 UTC 18:00 = 台灣 02:00
  push:
    paths:
      - 'build_data.py'
      - 'nhi_payment_rules.pdf'  # PDF 更新時也重跑

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check PDF status
        run: |
          if [ -f nhi_payment_rules.pdf ]; then
            echo "✅ 找到健保給付規定 PDF（$(du -h nhi_payment_rules.pdf | cut -f1)）"
          else
            echo "⚠️  找不到 nhi_payment_rules.pdf，章節對照將跳過"
            echo "    請至健保署下載最新 PDF 命名為 nhi_payment_rules.pdf 放入 repo 根目錄"
            echo "    來源：https://www.nhi.gov.tw/ch/cp-13108-67ddf-2508-1.html"
          fi

      - name: Build drug database
        run: python build_data.py

      - name: Show output file info
        run: |
          ls -lh drugs_data.json
          python -c "
          import json
          d = json.load(open('drugs_data.json', encoding='utf-8'))
          m = d['_meta']
          print(f'總筆數: {m[\"totalRecords\"]:,}')
          print(f'健保品項: {m[\"nhiRecords\"]:,}')
          print(f'章節對照: {m[\"chaptersTotal\"]:,}')
          "

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drugs_data.json
          if git diff --staged --quiet; then
            echo "📋 資料無變動，跳過 commit"
          else
            git commit -m "data: 自動更新藥品資料庫 $(date +'%Y-%m-%d')"
            git push
            echo "✅ 已自動更新 drugs_data.json"
          fi